<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form for HTML</title>
</head>

<body>
    <h2>User Information</h2>
    <form action="submit" method="post">
        <label for="fname">First name</label>
        <input id="fname" name="fname" placeholder="enter your first name" type="text" />
        <br>
        <br>
        <label for="lname">Last name</label>
        <input id="lname" name="lname" placeholder="enter your last name" type="text" />
        <br>
        <br>
        <input type="submit" value="Submit" />
    </form>
</body>

</html>
